name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Compile Python files
        run: python -m compileall -q topological_photonics examples tests

      - name: Run tests
        run: MPLCONFIGDIR=/tmp/mpl python -m unittest discover -s tests -v
